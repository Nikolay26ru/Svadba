{% extends "base.html" %}
{% block title %}Вход · Админ-панель{% endblock %}
{% block body %}
<section class="card center narrow"><div class="stack stagger">
  <div class="monogram"><span>К</span><span class="star">✦</span><span>Г</span></div>
  <h1>Админ-панель</h1>
  <p class="eyebrow">Свадьба · ответы гостей</p>
  {% if error %}<div class="banner err">{{ error }}</div>{% endif %}
  <form class="login" method="post" action="{{ url_for('admin_do_login') }}">
    <input type="hidden" name="csrf" value="{{ csrf_token() }}">
    <input type="password" name="password" placeholder="Пароль" autocomplete="current-password" autofocus required>
    <button type="submit" class="submit-btn">Войти</button>
  </form>
</div></section>
{% endblock %}
